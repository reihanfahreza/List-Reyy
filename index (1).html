  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TONTONANKU — Katalog Anime & Donghua</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0E14;
    --panel:#13172238;
    --panel-solid:#151A28;
    --line:#252B3D;
    --text:#EDEAE0;
    --muted:#8B91A8;
    --amber:#FF6B35;   /* aksen ANIME */
    --jade:#2DD4BF;    /* aksen DONGHUA */
    --gold:#E8B45A;

    --display:'Anton', sans-serif;
    --body:'Plus Jakarta Sans', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:var(--body);
    overflow-x:hidden;
  }
  a{color:inherit; text-decoration:none;}

  ::selection{background:var(--amber); color:#0B0E14;}

  /* ---------- NAVBAR ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px clamp(16px,5vw,48px);
    background:linear-gradient(to bottom, rgba(11,14,20,0.95), rgba(11,14,20,0));
    backdrop-filter:blur(2px);
  }
  .header-left{display:flex; align-items:center; gap:14px;}
  .hamburger{
    width:36px; height:36px; border-radius:8px;
    background:transparent; border:1px solid var(--line);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .hamburger svg{width:18px; height:18px;}
  .hamburger:hover{background:var(--panel-solid);}
  .logo{
    font-family:var(--display);
    font-size:22px;
    letter-spacing:0.5px;
    display:flex; align-items:baseline; gap:6px;
  }
  .logo span{color:var(--amber);}
  nav{display:flex; gap:28px; font-size:14px; font-weight:600;}
  nav a{
    color:var(--muted);
    position:relative;
    padding-bottom:4px;
    transition:color .2s;
  }
  nav a:hover{color:var(--text);}
  nav a:focus-visible{outline:2px solid var(--gold); outline-offset:4px; border-radius:2px;}
  .search-icon-btn{
    width:36px; height:36px; border-radius:8px;
    background:transparent; border:1px solid var(--line);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    cursor:pointer; margin-left:6px;
  }
  .search-icon-btn svg{width:16px; height:16px;}
  .search-icon-btn:hover{background:var(--panel-solid);}
  @media (max-width:640px){
    nav a{display:none;}
    .search-icon-btn{display:flex; margin-left:auto;}
  }

  /* ---------- NAV DRAWER ---------- */
  .drawer-overlay{
    position:fixed; inset:0; z-index:400;
    background:rgba(5,6,10,.65);
    display:none; opacity:0; transition:opacity .25s;
  }
  .drawer-overlay.open{display:block; opacity:1;}
  .drawer{
    position:fixed; top:0; left:0; bottom:0; z-index:401;
    width:min(300px,82vw);
    background:var(--panel-solid);
    border-right:1px solid var(--line);
    padding:20px;
    transform:translateX(-100%);
    transition:transform .3s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column;
  }
  .drawer-overlay.open .drawer{transform:translateX(0);}
  .drawer-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .drawer-head span{font-family:var(--mono); font-size:11px; letter-spacing:2px; color:var(--muted);}
  .drawer-close{
    width:30px; height:30px; border-radius:50%; border:none; background:transparent;
    color:var(--muted); font-size:18px; cursor:pointer;
  }
  .drawer-close:hover{color:var(--text);}
  .drawer-search{position:relative; margin-bottom:18px;}
  .drawer-search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--muted);}
  .drawer-search input{
    width:100%; background:var(--ink); border:1px solid var(--line); border-radius:9px;
    padding:11px 14px 11px 34px; color:var(--text); font-family:var(--body); font-size:13px;
  }
  .drawer-search input:focus{outline:none; border-color:var(--gold);}
  .drawer-menu{display:flex; flex-direction:column; gap:4px;}
  .drawer-menu a, .drawer-menu button{
    display:flex; align-items:center; gap:12px;
    padding:11px 12px; border-radius:8px;
    color:var(--muted); font-weight:600; font-size:14px;
    background:transparent; border:none; text-align:left; cursor:pointer;
    width:100%;
  }
  .drawer-menu a:hover, .drawer-menu button:hover{background:rgba(255,255,255,.05); color:var(--text);}
  .drawer-menu svg{width:17px; height:17px; flex:0 0 auto;}

  /* ---------- GENRES PAGE ---------- */
  .page-overlay{
    position:fixed; inset:0; z-index:350;
    background:var(--ink);
    display:none;
    transform:translateX(100%);
    transition:transform .3s cubic-bezier(.32,.72,0,1);
    overflow-y:auto;
  }
  .page-overlay.open{display:block; transform:translateX(0);}
  .page-head{
    position:sticky; top:0; z-index:2;
    display:flex; align-items:center; gap:14px;
    padding:18px clamp(16px,5vw,48px);
    background:linear-gradient(to bottom, var(--ink) 70%, rgba(11,14,20,0));
  }
  .page-back{
    width:38px; height:38px; border-radius:50%;
    background:var(--panel-solid); border:1px solid var(--line);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px; flex:0 0 auto;
  }
  .page-title{font-family:var(--display); font-size:22px; text-transform:uppercase; letter-spacing:1px;}
  .page-body{padding:4px clamp(16px,5vw,48px) 60px;}
  .page-sub{color:var(--muted); font-size:14px; margin-bottom:18px; max-width:520px;}
  .genre-search-wrap{position:relative; max-width:420px; margin-bottom:26px;}
  .genre-search-wrap svg{position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--muted);}
  #genreSearchInput{
    width:100%; background:var(--panel-solid); border:1px solid var(--line); border-radius:10px;
    padding:13px 14px 13px 38px; color:var(--text); font-family:var(--body); font-size:14px;
  }
  #genreSearchInput:focus{outline:none; border-color:var(--gold);}
  .genre-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px,1fr));
    gap:14px;
  }
  .genre-card{
    background:var(--panel-solid); border:1px solid var(--line); border-radius:12px;
    padding:18px; cursor:pointer; transition:border-color .2s, transform .2s;
  }
  .genre-card:hover{border-color:var(--gold); transform:translateY(-2px);}
  .genre-card-name{font-weight:700; font-size:15px; margin-bottom:6px;}
  .genre-card-count{
    font-family:var(--mono); font-size:12px; color:var(--muted);
    display:flex; align-items:center; gap:6px;
  }
  .genre-card-count .dot{width:5px; height:5px; border-radius:50%; background:var(--jade);}
  .genre-empty{font-family:var(--mono); font-size:13px; color:var(--muted); padding:20px 0;}

  .hero{
    position:relative;
    height:min(86vh, 640px);
    min-height:420px;
    overflow:hidden;
  }
  .slides{
    display:flex;
    height:100%;
    transition:transform .55s cubic-bezier(.65,0,.35,1);
    touch-action: pan-y;
  }
  .slide{
    position:relative;
    flex:0 0 100%;
    height:100%;
    display:flex;
    align-items:flex-end;
    padding:clamp(28px,6vw,72px);
    user-select:none;
  }
  .slide .bg{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
  }
  .slide .scrim{
    position:absolute; inset:0;
    background:
      linear-gradient(to top, var(--ink) 5%, rgba(11,14,20,.15) 55%, rgba(11,14,20,.55) 100%),
      linear-gradient(to right, rgba(11,14,20,.65) 0%, rgba(11,14,20,0) 55%);
  }
  .slide-content{position:relative; z-index:2; max-width:640px;}
  .kicker{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:2px;
    padding:5px 10px;
    border:1px solid currentColor;
    border-radius:3px;
    display:inline-block;
    margin-bottom:14px;
  }
  .kicker.k-anime{color:var(--amber);}
  .kicker.k-donghua{color:var(--jade);}
  .slide-title{
    font-family:var(--display);
    font-size:clamp(32px,6vw,58px);
    line-height:1.02;
    text-transform:uppercase;
    margin-bottom:14px;
    text-shadow:0 4px 24px rgba(0,0,0,.4);
  }
  .slide-meta{
    display:flex; align-items:center; gap:14px;
    font-family:var(--mono); font-size:13px; color:var(--muted);
  }
  .ep-badge{
    font-family:var(--mono);
    font-size:13px; font-weight:700;
    padding:5px 12px; border-radius:20px;
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,.06);
    border:1px solid var(--line);
  }
  .ep-badge .dot{width:6px; height:6px; border-radius:50%; background:var(--jade); animation:pulse 1.6s infinite;}
  .ep-badge.end .dot{background:var(--muted); animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

  .hero-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    z-index:3; width:42px; height:42px; border-radius:50%;
    background:rgba(11,14,20,.55); border:1px solid var(--line);
    color:var(--text); font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background .2s, transform .2s;
  }
  .hero-arrow:hover{background:rgba(11,14,20,.85); transform:translateY(-50%) scale(1.06);}
  .hero-arrow.prev{left:18px;}
  .hero-arrow.next{right:18px;}

  .hero-dots{
    position:absolute; bottom:18px; right:clamp(16px,5vw,48px); z-index:3;
    display:flex; gap:8px;
  }
  .hero-dots button{
    width:26px; height:4px; border-radius:2px; border:none;
    background:rgba(255,255,255,.25); cursor:pointer; transition:background .2s, width .2s;
  }
  .hero-dots button.active{background:var(--gold); width:38px;}

  /* ---------- SECTIONS ---------- */
  main{padding:48px clamp(16px,5vw,48px) 80px;}
  .section{margin-bottom:56px;}
  .section-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:18px;
  }
  .section-title{
    font-family:var(--display);
    font-size:clamp(22px,3vw,30px);
    text-transform:uppercase;
    letter-spacing:1px;
    display:flex; align-items:center; gap:12px;
  }
  .section-title .bar{width:6px; height:24px; border-radius:2px;}
  .section-title.donghua .bar{background:var(--jade);}
  .section-title.anime .bar{background:var(--amber);}
  .section-sub{font-family:var(--mono); font-size:12px; color:var(--muted);}
  .see-all{
    display:flex; align-items:center; gap:4px;
    font-family:var(--body); font-weight:700; font-size:13px;
    color:var(--text); white-space:nowrap; cursor:pointer; background:none; border:none;
  }
  .see-all svg{width:16px; height:16px;}
  .see-all:hover{color:var(--gold);}

  .preview-grid, .catalog-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px 14px;
  }
  @media (min-width:560px){
    .preview-grid, .catalog-grid{grid-template-columns:repeat(4, 1fr);}
  }
  @media (min-width:860px){
    .catalog-grid{grid-template-columns:repeat(6, 1fr);}
  }
  .preview-grid .card, .catalog-grid .card{flex:none; width:100%;}
  .preview-grid .poster, .catalog-grid .poster{width:100%; height:auto; aspect-ratio:2/3;}

  .card{
    flex:0 0 180px;
    scroll-snap-align:start;
    cursor:pointer;
  }
  .card:focus-visible .poster{outline:2px solid var(--gold); outline-offset:2px;}
  .poster{
    position:relative;
    width:180px; height:252px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    transition:transform .25s, border-color .25s;
  }
  .card:hover .poster{transform:translateY(-6px); border-color:var(--gold);}
  .poster-glyph{
    font-family:var(--display);
    font-size:42px;
    color:rgba(255,255,255,.35);
    text-transform:uppercase;
  }
  .poster-status{
    position:absolute; top:8px; left:8px;
    font-family:var(--mono); font-size:10px; font-weight:700;
    padding:3px 8px; border-radius:12px;
    background:rgba(11,14,20,.65); backdrop-filter:blur(2px);
    display:flex; align-items:center; gap:5px;
  }
  .poster-status .dot{width:5px; height:5px; border-radius:50%; background:var(--jade); animation:pulse 1.6s infinite;}
  .poster-status.end .dot{background:var(--muted); animation:none;}

  .card-title{
    margin-top:10px; font-size:14px; font-weight:700;
    line-height:1.3;
  }
  .card-eps{
    margin-top:3px; font-family:var(--mono); font-size:11px; color:var(--muted);
  }

  /* --- placeholder gradient generator: ganti dengan poster asli (lihat komentar di JS) --- */
  .pg-0{background:linear-gradient(150deg,#1f2440,#3a2a55);}
  .pg-1{background:linear-gradient(150deg,#16363a,#1f5c52);}
  .pg-2{background:linear-gradient(150deg,#3a1f1f,#6e3326);}
  .pg-3{background:linear-gradient(150deg,#2a1f3a,#5a2a55);}
  .pg-4{background:linear-gradient(150deg,#1f3a2e,#246e4f);}
  .pg-5{background:linear-gradient(150deg,#3a2a1f,#6e5226);}

  /* ---------- SEARCH (sekarang dipakai di dalam search overlay) ---------- */
  .search-overlay{
    position:fixed; inset:0; z-index:380;
    background:rgba(5,6,10,.7);
    display:none; align-items:flex-start; justify-content:center;
    opacity:0; transition:opacity .2s;
  }
  .search-overlay.open{display:flex; opacity:1;}
  .search-panel{
    width:100%; max-width:640px;
    background:var(--ink);
    margin-top:0;
    max-height:100vh;
    overflow-y:auto;
    border-bottom:1px solid var(--line);
  }
  .search-panel-head{
    display:flex; align-items:center; gap:10px;
    padding:18px clamp(16px,5vw,32px);
    border-bottom:1px solid var(--line);
  }
  .search-result-list{padding:8px clamp(16px,5vw,32px) 30px;}
  .search-result-item{
    display:flex; align-items:center; gap:14px;
    padding:10px 4px; cursor:pointer; border-radius:8px;
  }
  .search-result-item:hover{background:var(--panel-solid);}
  .search-result-thumb{
    width:46px; height:64px; border-radius:6px; flex:0 0 auto;
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    background-size:cover; background-position:center;
  }
  .search-result-thumb .poster-glyph{font-size:16px;}
  .search-result-info{flex:1; min-width:0;}
  .search-result-title{font-weight:700; font-size:14px; margin-bottom:3px;}
  .search-result-meta{font-family:var(--mono); font-size:11px; color:var(--muted);}
  .search-result-cat{
    font-family:var(--mono); font-size:10px; font-weight:700; padding:2px 8px;
    border-radius:10px; border:1px solid var(--jade); color:var(--jade); flex:0 0 auto;
  }
  .search-result-cat.anime{border-color:var(--amber); color:var(--amber);}

  .search-wrap{
    position:relative;
    flex:1;
  }
  .search-wrap svg{
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; color:var(--muted); pointer-events:none;
  }
  #searchInput{
    width:100%;
    background:var(--panel-solid);
    border:1px solid var(--line);
    border-radius:10px;
    padding:13px 40px 13px 38px;
    color:var(--text);
    font-family:var(--body);
    font-size:14px;
  }
  #searchInput::placeholder{color:var(--muted);}
  #searchInput:focus{outline:none; border-color:var(--gold);}
  #searchClear{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:26px; height:26px; border-radius:50%; border:none;
    background:transparent; color:var(--muted); font-size:16px;
    cursor:pointer; display:none; align-items:center; justify-content:center;
  }
  #searchClear.show{display:flex;}
  #searchClear:hover{color:var(--text);}
  .search-overlay-close{
    width:38px; height:38px; border-radius:50%; flex:0 0 auto;
    background:var(--panel-solid); border:1px solid var(--line);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px;
  }

  .empty-state{
    display:none;
    font-family:var(--mono); font-size:13px; color:var(--muted);
    padding:18px 4px;
  }

  /* ---------- DETAIL MODAL ---------- */
  .detail-overlay{
    position:fixed; inset:0; z-index:500;
    background:rgba(5,6,10,.7);
    display:none; align-items:flex-end; justify-content:center;
    opacity:0; transition:opacity .25s;
  }
  .detail-overlay.open{display:flex; opacity:1;}
  .detail-sheet{
    width:100%; max-width:720px; max-height:92vh;
    background:var(--ink);
    border-radius:18px 18px 0 0;
    overflow-y:auto;
    transform:translateY(40px);
    transition:transform .35s cubic-bezier(.32,.72,0,1);
    border:1px solid var(--line); border-bottom:none;
  }
  .detail-overlay.open .detail-sheet{transform:translateY(0);}
  .detail-banner{
    position:relative; width:100%; height:min(48vh,300px);
    background-size:cover; background-position:center;
    border-radius:18px 18px 0 0;
  }
  .detail-banner-scrim{
    position:absolute; inset:0; border-radius:18px 18px 0 0;
    background:linear-gradient(to top, var(--ink) 2%, rgba(11,14,20,.05) 60%);
  }
  .detail-glyph{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--display); font-size:64px; color:rgba(255,255,255,.25);
  }
  .detail-back{
    position:absolute; top:16px; left:16px; z-index:2;
    width:38px; height:38px; border-radius:50%;
    background:rgba(11,14,20,.6); border:1px solid var(--line);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px;
  }
  .detail-back:hover{background:rgba(11,14,20,.9);}
  .detail-schedule{
    position:absolute; left:22px; bottom:16px; z-index:2;
    display:flex; align-items:center; gap:7px;
    font-family:var(--body); font-weight:700; font-style:italic; font-size:14px;
  }
  .detail-schedule svg{width:18px; height:18px;}
  .detail-schedule.ongoing{color:var(--gold);}
  .detail-schedule.tamat{color:var(--muted);}
  .detail-body{padding:22px clamp(18px,4vw,28px) 44px;}
  .detail-title{
    font-family:var(--display); font-size:clamp(24px,4vw,32px);
    text-transform:none; line-height:1.15; margin-bottom:18px;
  }
  .detail-genres{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:26px;}
  .genre-chip{
    flex:0 0 auto; font-size:13px; font-weight:600;
    padding:7px 16px; border-radius:20px;
    border:1px solid var(--amber); color:var(--amber);
    white-space:nowrap;
  }
  .genre-chip.donghua{border-color:var(--jade); color:var(--jade);}
  .detail-sinopsis-label{
    font-family:var(--display); font-size:18px; text-transform:uppercase;
    margin-bottom:10px; letter-spacing:1px;
  }
  .detail-sinopsis{font-size:14.5px; line-height:1.75; color:var(--text); opacity:.85;}

  footer{
    padding:28px clamp(16px,5vw,48px) 40px;
    border-top:1px solid var(--line);
    font-family:var(--mono); font-size:12px; color:var(--muted);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }

  @media (max-width:640px){
    nav a{display:none;}
    .card{flex:0 0 130px;}
    .poster{width:130px; height:182px;}
    .hero{height:58vh; min-height:360px;}
    .slide .bg{background-position:center 18%;}
    .slide{padding:20px clamp(16px,5vw,28px) 28px;}
    .slide-title{font-size:clamp(26px,7vw,40px);}
  }

  @media (prefers-reduced-motion:reduce){
    .slides{transition:none;}
    .ep-badge .dot, .poster-status .dot{animation:none;}
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="hamburger" id="hamburgerBtn" aria-label="Buka menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="logo">TONTONAN<span>KU</span></div>
  </div>
  <nav>

    { title: "Legend Of Martial Immortal", eps: 127, poster: "https://i.pinimg.com/736x/30/fe/8f/30fe8f6b7350de4f52e6b844a17b1a2b.jpg", banner: "https://i.imgur.com/8cZ90bO.png", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], synopsis: "Setelah dikhianati dan dibunuh oleh sahabatnya sendiri, Qin Chen, seorang ahli bela diri legendaris, bereinkarnasi ke tubuh seorang pemuda yang lemah. Dengan pengalaman dari kehidupan sebelumnya, ia memulai kembali jalan kultivasi untuk membalas dendam, melindungi orang-orang yang ia cintai, dan kembali menjadi kultivator terkuat." },
    { title: "LingWu Continent", eps: 159, poster: "https://i.pinimg.com/736x/d9/68/1d/d9681d4808ba595f29f931b2eb207f9a.jpg", banner: "https://i.imgur.com/rv1z8Di.png", genres: ["Action","Adventure","Fantasy","Reincarnation"], releaseDay: "Minggu", synopsis: "Di dunia tempat kekuatan spiritual dan bela diri berjalan berdampingan, Chen Tian, seorang jenius yang kehilangan bakat kultivasinya, bertekad bangkit kembali setelah memperoleh kesempatan kedua. Dengan tekad kuat, ia menjalani perjalanan kultivasi, menghadapi musuh-musuh tangguh, mengungkap rahasia masa lalunya, dan berusaha mencapai puncak kekuatan demi mengubah takdirnya." },
    { title: "Lost On Journey", eps: 18, poster: "https://i.imgur.com/G01FgTe.png", banner: "https://i.imgur.com/ScIjEoD.jpeg", genres: ["Action","Adventure","Fantasy"], synopsis: "Seorang pemuda tanpa sengaja terjebak di dunia misterius yang penuh reruntuhan kuno, makhluk berbahaya, dan berbagai rahasia yang belum terpecahkan. Untuk menemukan jalan pulang, ia harus bertahan hidup, bekerja sama dengan sekutu baru, serta mengungkap konspirasi besar yang mengancam dunia tersebut." },
    { title: "Martial Master", eps: 667, poster: "https://i.pinimg.com/736x/09/90/0c/09900c39eb554655acffac31f01143fe.jpg", banner: "https://i.imgur.com/xaBJxHr.png", genres: ["Action","Drama","Fantasy","Historical","Martial Arts"], releaseDay: "Selasa", synopsis: "Setelah dikhianati dan dibunuh oleh sahabatnya sendiri, Qin Chen bereinkarnasi ke tubuh seorang pemuda yang lemah. Berbekal ingatan dan pengalaman dari kehidupan sebelumnya, ia kembali menempuh jalan kultivasi untuk membalas dendam, melindungi orang-orang yang ia cintai, dan menjadi ahli bela diri terkuat." },
    { title: "My Senior Brother Is Too Steady", eps: 66, poster: "https://i.pinimg.com/736x/d8/00/1b/d8001b56b22901fecdee3f48f45a065c.jpg", banner: "https://i.imgur.com/zWsMBJn.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], releaseDay: "Kamis", synopsis: "Li Changshou, seorang pemuda yang bereinkarnasi ke dunia kultivasi, memilih hidup dengan satu prinsip: selalu berhati-hati. Alih-alih mencari ketenaran, ia menyembunyikan kekuatannya, merencanakan segala sesuatu dengan matang, dan menghindari risiko sebisa mungkin. Namun, berbagai kejadian tak terduga terus menyeretnya ke dalam konflik besar yang menguji kecerdasan dan strateginya." },
    { title: "Martial God Asura", season: "S2", eps: 10, poster: "https://i.pinimg.com/736x/e0/b7/d2/e0b7d203f623b9120f4087a967cea239.jpg", banner: "https://i.imgur.com/Otr1Wzi.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], synopsis: "Chu Feng, seorang murid luar yang diremehkan karena bakatnya dianggap biasa, secara tak sengaja memperoleh warisan kekuatan misterius yang mengubah hidupnya. Dengan tekad dan kerja keras, ia menempuh jalan kultivasi, menghadapi musuh-musuh kuat, mengungkap rahasia masa lalunya, dan terus berkembang demi menjadi salah satu kultivator terkuat di dunia." },
    { title: "Martial Peak", eps: "END", poster: "https://i.pinimg.com/736x/6a/11/73/6a1173d041304300f45379ef29529e12.jpg", banner: "https://i.imgur.com/lVWyRLA.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], synopsis: "Yang Kai, seorang murid percobaan yang sering diremehkan, memperoleh warisan kuno yang mengubah jalan hidupnya. Berbekal tekad pantang menyerah, ia menempuh perjalanan kultivasi penuh tantangan, menghadapi musuh-musuh kuat, menjelajahi berbagai alam, dan terus berkembang demi mencapai puncak seni bela diri—Martial Peak." },
    { title: "Over The Divine Kingdom", eps: "END", poster: "https://i.imgur.com/16vm2T4.png", banner: "https://i.imgur.com/MqLaahc.png", genres: ["Action","Adventure","Fantasy"], synopsis: "Ning Changjiu, seorang pendeta Tao muda, pergi ke ibu kota bersama guru dan adik seperguruannya untuk mengusir iblis. Namun saat ritual pengusiran, ia justru dijadikan wadah penyegel iblis oleh gurunya sendiri. Kejadian itu membangkitkan ingatan kehidupan sebelumnya, di mana ia pernah dibunuh oleh gurunya. Kini, dengan ingatan dan kekuatan yang belum pulih sepenuhnya, Ning Changjiu berusaha mengungkap identitas aslinya, alasan kematiannya, serta mematahkan takdir yang telah ditentukan." },
    { title: "Perfect World", eps: 274, poster: "https://i.imgur.com/055qXPj.png", banner: "https://i.imgur.com/EWd07DT.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], releaseDay: "Kamis", synopsis: "Shi Hao, seorang anak yang terlahir dengan bakat luar biasa, kehilangan kekuatan berharganya akibat pengkhianatan sejak kecil. Meski menghadapi berbagai cobaan, ia tumbuh menjadi kultivator yang sangat kuat. Dalam perjalanannya, Shi Hao menjelajahi berbagai dunia, melawan musuh-musuh yang semakin kuat, dan berjuang mencapai puncak kekuatan demi melindungi orang-orang yang ia cintai serta mengungkap rahasia dunia." },
    { title: "Peak Of True Martial Arts", eps: 68, poster: "https://i.pinimg.com/736x/22/57/8d/22578d048e2ac233ebed7bc5ff39c116.jpg", banner: "", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], synopsis: "Nie Feng, seorang jenius bela diri, dikhianati dan kehilangan segalanya. Setelah memperoleh kesempatan kedua, ia kembali menempuh jalan kultivasi dengan tekad untuk membalas dendam, mengungkap berbagai konspirasi, dan terus meningkatkan kekuatannya hingga mencapai puncak seni bela diri sejati." },
    { title: "Renegade Immortal", eps: 146, poster: "https://i.imgur.com/NQSjK3l.png", banner: "https://i.imgur.com/iS0Csbh.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], releaseDay: "Minggu", synopsis: "Wang Lin, seorang pemuda biasa dengan bakat yang tidak menonjol, memulai perjalanan kultivasi demi memenuhi harapan keluarganya. Setelah mengalami berbagai pengkhianatan dan kehilangan, ia berubah menjadi kultivator yang tangguh dan tanpa kompromi. Dalam perjalanannya, Wang Lin menghadapi musuh-musuh yang semakin kuat, mengungkap rahasia dunia kultivasi, dan berjuang melawan takdir untuk mencapai keabadian." },
    { title: "Shrouding The Heavens", eps: 168, poster: "https://i.imgur.com/Y8Zx9jV.png", banner: "https://i.imgur.com/rvpFFpC.jpeg", genres: ["Action","Adventure","Fantasy","Martial Arts","Sci-Fi"], releaseDay: "Selasa", synopsis: "Ye Fan, seorang mahasiswa biasa, tiba-tiba terseret ke dunia kultivasi bersama teman-temannya setelah sebuah peti mati perunggu kuno muncul secara misterius. Di dunia yang penuh bahaya itu, ia memulai perjalanan untuk bertahan hidup, mengungkap rahasia alam semesta, menghadapi para kultivator terkuat, dan menempuh jalan menuju puncak kekuatan." },
    { title: "Soul Land 2", season: "S2", eps: 153, poster: "https://i.pinimg.com/736x/3d/4e/26/3d4e264e66deb87f926871ecb2adf69e.jpg", banner: "https://i.imgur.com/mjVzI2o.jpeg", genres: ["Action","Adventure","Fantasy","Martial Arts"], releaseDay: "Jumat", synopsis: "Berlatar ribuan tahun setelah kisah Tang San, cerita mengikuti Huo Yuhao, seorang pemuda berbakat yang kehilangan ibunya sejak kecil. Demi menjadi lebih kuat, ia bergabung dengan Akademi Shrek dan memulai perjalanan sebagai Master Roh. Bersama rekan-rekannya, Huo Yuhao menghadapi berbagai ancaman, membangkitkan kembali kejayaan Sekte Tang, dan berjuang melindungi dunia Douluo." },
    { title: "Supreme Alchemy", eps: 168, poster: "https://i.pinimg.com/736x/11/c8/48/11c8487514b77ed8528a10d479b965ce.jpg", banner: "https://i.imgur.com/uKGg3Ta.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], releaseDay: "Kamis", synopsis: "Qin Nan, seorang alkemis jenius yang dikhianati dan kehilangan segalanya, memperoleh kesempatan kedua untuk memulai kembali jalan kultivasinya. Dengan pengetahuan alkimia yang luar biasa, ia meracik pil-pil legendaris, menghadapi musuh-musuh kuat, mengungkap konspirasi besar, dan bertekad mencapai puncak Dao Alkimia serta menjadi alkemis terkuat." },
    { title: "Sword of Coming", season: "S2", eps: "END", poster: "https://i.imgur.com/96SIE7x.png", banner: "https://i.imgur.com/iCMQNec.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], synopsis: "Chen Ping'an, seorang pemuda sederhana dari desa kecil, memulai perjalanan setelah takdir membawanya memasuki dunia kultivasi. Berbekal ketekunan, hati yang teguh, dan tekad untuk melindungi orang-orang yang ia sayangi, ia menjelajahi dunia luas, bertemu para pendekar dan kultivator hebat, serta perlahan tumbuh menjadi seorang ahli pedang yang disegani." },
    { title: "Stellar Transformation", season: "S1", eps: 9, poster: "https://i.imgur.com/BogAne0.png", banner: "https://i.imgur.com/4ZqgfMi.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts","Romance"], synopsis: "Qin Yu, putra ketiga seorang pangeran, terlahir tanpa bakat untuk mengikuti jalur kultivasi biasa. Pantang menyerah, ia memilih menciptakan jalannya sendiri melalui teknik kultivasi unik Stellar Transformation. Dengan tekad yang kuat, Qin Yu terus berkembang, menghadapi musuh-musuh tangguh, dan berjuang mencapai puncak kekuatan demi melindungi keluarganya dan mengubah takdirnya." },
    { title: "Supreme God Emperor", eps: 197, poster: "https://i.pinimg.com/736x/df/28/2a/df282af99074a16dcce8009dc9e00bb1.jpg", banner: "https://i.imgur.com/5BFpLCI.jpeg", genres: ["Action","Adventure","Fantasy","Martial Arts","Reincarnation","Supernatural"], releaseDay: "Senin", synopsis: "Mu Yun, seorang Kaisar Dewa yang dikhianati dan dibunuh, bereinkarnasi ke tubuh seorang guru muda yang lemah. Dengan ingatan dan pengalaman dari kehidupan sebelumnya, ia kembali menempuh jalan kultivasi, membalas dendam kepada musuh-musuhnya, melindungi orang-orang yang ia sayangi, dan bertekad merebut kembali gelarnya sebagai Supreme God Emperor." },
    { title: "Swallowed Star", eps: 58, poster: "https://i.imgur.com/8GLoenk.png", banner: "https://i.imgur.com/FR5K1H9.jpeg", genres: ["Action","Adventure","Fantasy","Martial Arts","Sci-Fi"], releaseDay: "Senin", synopsis: "Luo Feng, seorang pemuda yang hidup di dunia pasca-apokaliptik yang dipenuhi monster, bercita-cita menjadi petarung terkuat untuk melindungi keluarganya. Setelah membangkitkan bakat luar biasa, ia terus berkembang melalui latihan dan pertarungan sengit, menjelajahi alam semesta, menghadapi ancaman yang semakin besar, dan berusaha mencapai puncak kekuatan demi melindungi umat manusia." },
    { title: "Sword and Fairy 3", eps: 10, poster: "https://i.imgur.com/WEgK3ii.png", banner: "https://i.imgur.com/va0sbZZ.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], synopsis: "Jing Tian, seorang pemuda biasa yang bekerja di sebuah toko barang antik, tanpa sengaja terlibat dalam pencarian pedang suci dan artefak kuno. Bersama Tang Xuejian, Xu Changqing, dan rekan-rekannya, ia memulai petualangan melawan kekuatan jahat, mengungkap rahasia kehidupan masa lalunya, serta berjuang menyelamatkan dunia dari ancaman kehancuran." },
    { title: "Tales of Herding Gods", eps: 88, poster: "https://i.imgur.com/Rn7mm27.png", banner: "https://i.imgur.com/9S7JGrI.png", genres: ["Action","Adventure","Fantasy","Historical"], releaseDay: "Minggu", synopsis: "Qin Mu, seorang anak yatim piatu yang dibesarkan oleh sembilan tetua misterius di sebuah desa terpencil, tumbuh menjadi pemuda berbakat dengan kemampuan luar biasa. Saat menjelajahi dunia, ia mengungkap berbagai rahasia tentang asal-usulnya, menghadapi para dewa, iblis, dan musuh-musuh kuat, serta memulai perjalanan untuk mengubah nasib dunia dengan kekuatan dan keyakinannya sendiri." },
    { title: "Tales of Demons And Gods", season: "S9", eps: 11, poster: "https://i.pinimg.com/736x/4e/88/3f/4e883f3b533c2bd145ef01e92941d6ad.jpg", banner: "https://i.imgur.com/kQNgys4.png", genres: ["Action","Adventure","Comedy","Fantasy","Romance"], synopsis: "Nie Li, seorang kultivator terkuat yang tewas saat melawan Kaisar Sage, bereinkarnasi kembali ke masa mudanya. Dengan pengetahuan dari kehidupan sebelumnya, ia bertekad mengubah takdir, melindungi keluarga dan kota kelahirannya, membimbing teman-temannya menjadi lebih kuat, serta menghadapi ancaman besar yang pernah menghancurkan dunia." },
    { title: "Throne of The Sword Master", eps: 35, poster: "https://i.pinimg.com/736x/8d/10/3f/8d103f92619670791aa6b37a5158f711.jpg", banner: "https://i.imgur.com/kt7Kute.jpeg", genres: ["Action","Adventure","Fantasy"], synopsis: "Chu Mu, seorang pendekar muda berbakat, memulai perjalanan untuk menguasai ilmu pedang tertinggi setelah terlibat dalam konflik besar dunia persilatan. Di tengah persaingan antar sekte, konspirasi, dan kemunculan musuh-musuh kuat, ia terus mengasah kemampuan demi meraih Takhta Raja Pedang (Sword Throne) dan mengungkap rahasia yang dapat mengubah nasib dunia." },
    { title: "The Legend of Ling Tian", eps: 60, poster: "https://i.pinimg.com/736x/61/d6/59/61d65915e4f7b70a254af5aa7bc80c0d.jpg", banner: "https://i.imgur.com/uDapEwJ.jpeg", genres: ["Action","Adventure","Fantasy"], synopsis: "Ling Tian, seorang pendekar jenius yang dikhianati hingga tewas, memperoleh kesempatan untuk kembali ke masa lalu. Dengan ingatan dan pengalaman dari kehidupan sebelumnya, ia bertekad mengubah takdirnya, membalas dendam kepada musuh-musuhnya, melindungi orang-orang yang ia sayangi, dan menempuh jalan kultivasi untuk menjadi Supreme yang tak tertandingi." },
    { title: "Tomb of Fallen Gods", season: "S3", eps: 47, poster: "https://i.pinimg.com/736x/59/27/50/592750482b945544310510c4bc4b5552.jpg", banner: "https://i.imgur.com/8RrRgcr.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], releaseDay: "Jumat", synopsis: "Chen Nan, seorang pemuda yang bangkit dari Makam Para Dewa dan Iblis setelah tertidur selama 10.000 tahun, mendapati dunia telah berubah sepenuhnya. Tanpa mengetahui alasan kebangkitannya, ia memulai perjalanan untuk mencari kekasihnya Yu Xin, mengungkap misteri kematian para dewa dan iblis, serta menemukan kebenaran di balik masa lalunya dan takdir yang menghubungkannya dengan perang besar yang mengguncang dunia." },
    { title: "The Other Side of Deep Space", eps: "END", poster: "https://i.pinimg.com/1200x/da/d7/d0/dad7d003d8c215e426d14747d5b0828d.jpg", banner: "https://i.imgur.com/v37XdWj.jpeg", genres: ["Action","Adventure","Fantasy","Sci-Fi"], synopsis: "Wang Xuan, seorang jenius yang menguasai teknik kultivasi kuno, hidup di era ketika teknologi mulai menggantikan jalan kultivasi tradisional. Setelah bergabung dengan organisasi misterius Secret Path, ia memulai perjalanan penuh petualangan untuk mengungkap rahasia seni kultivasi kuno, menghadapi musuh-musuh kuat, dan menjelajahi kedalaman luar angkasa demi menghentikan bencana besar yang mengancam umat manusia." },
    { title: "The Gate of Mystical Realm", eps: "END", poster: "https://i.imgur.com/A1fzv8U.png", banner: "https://i.imgur.com/UBVv4Vl.png", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], synopsis: "Shi Mu, seorang putra angkat dari keluarga bangsawan, dipaksa menempuh jalan kultivasi untuk mencari kebenaran tentang asal-usulnya dan menebus masa lalunya. Di tengah persaingan antar sekte, konspirasi, dan musuh-musuh yang semakin kuat, ia membangkitkan kekuatan garis keturunan misterius yang mengubah takdirnya sekaligus menentukan masa depan Dunia Mistis." },
    { title: "The Return of The Immortal Emperor", eps: "END", poster: "https://i.pinimg.com/1200x/49/bd/c4/49bdc43e562b23f6e4b7c6c512944b75.jpg", banner: "https://i.imgur.com/jW80eJ3.png", genres: ["Action","Adventure","Fantasy"], synopsis: "Yun Qingyan, seorang pemuda yang menghilang dari dunia fana selama tiga tahun, sebenarnya telah menghabiskan 3.000 tahun di Alam Abadi hingga menjadi salah satu dari Sepuluh Kaisar Abadi. Saat kembali ke dunia asalnya, ia mendapati keluarganya telah hancur dan kekuatannya hampir lenyap. Berbekal pengalaman sebagai Kaisar Abadi, Yun Qingyan memulai perjalanan untuk memulihkan kekuatannya, menyelamatkan keluarganya, membalas dendam, dan kembali mencapai puncak kekuasaan." },
    { title: "The Great Ruler 3D", season: "S2", eps: 26, poster: "https://i.pinimg.com/736x/28/2b/6a/282b6a6981960cbc2bf7e4c3322267f8.jpg", banner: "https://i.imgur.com/gtnLkKL.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts","Romance"], releaseDay: "Jumat", synopsis: "Mu Chen, seorang pemuda berbakat dari Northern Spiritual Realm, bercita-cita menjadi kultivator terkuat di Great Thousand World. Dalam perjalanannya, ia menghadapi persaingan antar akademi dan sekte, mengalahkan musuh-musuh kuat, serta bersama Luo Li berjuang melawan ancaman besar yang mengancam dunia, demi meraih gelar sebagai The Great Ruler." },
    { title: "The Rich God", eps: 16, poster: "https://i.imgur.com/ppVJwT1.png", banner: "https://i.imgur.com/B2RjHDE.png", genres: ["Action","Adventure","Coomedy","Fantasy","Historical"], synopsis: "Wang Ke, seorang jenius di bidang keuangan, secara tak terduga berpindah ke dunia kultivasi melalui pedang pusaka keluarganya. Dengan kecerdasan bisnis dan teknik kultivasi warisan keluarganya, ia membangun kerajaan dagang sambil menghadapi konflik antara sekte lurus dan sekte iblis. Di tengah berbagai intrik dan pertarungan, Wang Ke perlahan tumbuh menjadi The Rich God, sosok yang menggabungkan kekayaan, strategi, dan kekuatan luar biasa." },
    { title: "The Alchemist's Rise", eps: "END", poster: "https://i.pinimg.com/736x/d6/38/0d/d6380d1e34ec0b2edcef96fe253c9f54.jpg", banner: "https://i.imgur.com/atVDcoV.jpeg", genres: ["Action","Adventure","Fantasy","Historical","Martial Arts"], synopsis: "Shen Xiang, seorang pemuda yang terlahir dengan cacat sehingga tidak bisa berkultivasi, mempertaruhkan segalanya untuk mencari obat yang dapat membuka meridian spiritualnya. Dalam perjalanannya, ia menyelamatkan dua dewi yang terluka dan secara tak terduga membangkitkan Meridian Ilahi dalam dirinya. Dengan bakat alkimia dan kultivasi yang luar biasa, Shen Xiang memulai perjalanan untuk melindungi keluarga, mengalahkan musuh-musuh kuat, dan menjadi Alkemis Agung yang melegenda." },

/* ambil item dari DATA berdasarkan daftar judul rekomendasi di atas;
   kalau ada judul yang gak ketemu / kurang dari "limit", sisanya
   ditambal pakai judul lain dari DATA biar tetap pas 12 */
function pickPreview(items, titles, limit){
  const picked = [];
  titles.forEach(t => {
    const found = items.find(i => i.title === t);
    if (found && !picked.includes(found)) picked.push(found);
  });
  for (const item of items) {
    if (picked.length >= limit) break;
    if (!picked.includes(item)) picked.push(item);
  }
  return picked.slice(0, limit);
}

function epLabel(item){
  const seasonPart = item.season ? item.season + " · " : "";
  if (item.eps === "END") return seasonPart + "Tamat";
  return seasonPart + "Eps " + item.eps;
}

function hashTitle(str){
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function buildPoster(item){
  const div = document.createElement("div");
  div.className = "poster pg-" + (hashTitle(item.title) % 6);
  // --> Ganti placeholder dengan poster asli:
  // if (item.poster) div.style.background = `url(${item.poster}) center/cover`;
  if (item.poster) {
    div.style.background = `url(${item.poster}) center/cover`;
  } else {
    const glyph = document.createElement("div");
    glyph.className = "poster-glyph";
    glyph.textContent = item.title.split(" ").map(w => w[0]).join("").slice(0,3);
    div.appendChild(glyph);
  }
  const status = document.createElement("div");
  status.className = "poster-status" + (item.eps === "END" ? " end" : "");
  status.innerHTML = '<span class="dot"></span>' + (item.eps === "END" ? "TAMAT" : "ONGOING");
  div.appendChild(status);
  return div;
}

function buildCard(item, cat){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.title = item.title;
  card.dataset.genres = (item.genres || []).join("|").toLowerCase();
  card.tabIndex = 0;
  card.appendChild(buildPoster(item));
  const title = document.createElement("div");
  title.className = "card-title";
  title.textContent = item.title;
  const eps = document.createElement("div");
  eps.className = "card-eps";
  eps.textContent = epLabel(item);
  card.appendChild(title);
  card.appendChild(eps);
  card.addEventListener("click", () => openDetail(item, cat));
  card.addEventListener("keydown", e => { if (e.key === "Enter") openDetail(item, cat); });
  return card;
}

/* preview grid di homepage: cuma nampilin "limit" judul pertama */
function renderPreview(containerId, items, cat, limit){
  const wrap = document.getElementById(containerId);
  items.slice(0, limit).forEach(item => wrap.appendChild(buildCard(item, cat)));
}
renderPreview("preview-donghua", pickPreview(DATA.donghua, PREVIEW_PICKS_DONGHUA, 12), "donghua", 12);

let listPageSource = [];

function renderListPageGrid(query){
  const q = (query || "").trim().toLowerCase();
  const filtered = listPageSource.filter(({ item }) => item.title.toLowerCase().includes(q));
  listPageGrid.innerHTML = "";
  if (filtered.length === 0) {
    listPageEmpty.style.display = "block";
    listPageGrid.style.display = "none";
    return;
  }
  listPageEmpty.style.display = "none";
  listPageGrid.style.display = "grid";
  filtered.forEach(({ item, cat }) => listPageGrid.appendChild(buildCard(item, cat)));
}

function openListPage(title, source, { searchable = true } = {}){
  listPageTitle.textContent = title;
  listPageSource = source;
  listPageSearchInput.value = "";
  listPageSearchWrap.style.display = searchable ? "" : "none";
  renderListPageGrid("");
  listPage.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeListPage(){
  listPage.classList.remove("open");
  document.body.style.overflow = "";
}
listPageBack.addEventListener("click", closeListPage);
listPageSearchInput.addEventListener("input", e => renderListPageGrid(e.target.value));

function donghuaSource(){ return DATA.donghua.map(item => ({ item, cat: "donghua" })); }
function animeSource(){ return DATA.anime.map(item => ({ item, cat: "anime" })); }

   Cari di SEMUA judul (donghua + anime), hasil tampil sebagai
   list. Klik salah satu hasil langsung buka modal detailnya.

const searchOverlay = document.getElementById("searchOverlay");
const searchOverlayClose = document.getElementById("searchOverlayClose");
const searchIconBtn = document.getElementById("searchIconBtn");
const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");
const searchResultList = document.getElementById("searchResultList");
const searchEmpty = document.getElementById("searchEmpty");

function buildSearchResultItem(item, cat){
  const el = document.createElement("div");
  el.className = "search-result-item";
  const thumb = document.createElement("div");
  thumb.className = "search-result-thumb pg-" + (hashTitle(item.title) % 6);
  if (item.poster) {
    thumb.style.backgroundImage = `url(${item.poster})`;
  } else {
    const glyph = document.createElement("div");
    glyph.className = "poster-glyph";
    glyph.textContent = item.title.split(" ").map(w => w[0]).join("").slice(0,2);
    thumb.appendChild(glyph);
  }
  const info = document.createElement("div");
  info.className = "search-result-info";
  const title = document.createElement("div");
  title.className = "search-result-title";
  title.textContent = item.title;
  const meta = document.createElement("div");
  meta.className = "search-result-meta";
  meta.textContent = epLabel(item);
  info.appendChild(title);
  info.appendChild(meta);
  const catTag = document.createElement("span");
  catTag.className = "search-result-cat" + (cat === "anime" ? " anime" : "");
  catTag.textContent = cat === "anime" ? "Anime" : "Donghua";
  el.appendChild(thumb);
  el.appendChild(info);
  el.appendChild(catTag);
  el.addEventListener("click", () => { closeSearchOverlay(); openDetail(item, cat); });
  return el;
}

function renderSearchResults(query){
  const q = query.trim().toLowerCase();
  searchClear.classList.toggle("show", q.length > 0);
  searchResultList.innerHTML = "";
  if (q === "") { searchEmpty.style.display = "none"; return; }
  const matches = allSource().filter(({ item }) => item.title.toLowerCase().includes(q));
  if (matches.length === 0) {
    searchEmpty.style.display = "block";
    return;
  }
  searchEmpty.style.display = "none";
  matches.slice(0, 40).forEach(({ item, cat }) => searchResultList.appendChild(buildSearchResultItem(item, cat)));
}

function openSearchOverlay(){
  searchOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
  setTimeout(() => searchInput.focus(), 50);
}
function closeSearchOverlay(){
  searchOverlay.classList.remove("open");
  document.body.style.overflow = "";
}
searchIconBtn.addEventListener("click", openSearchOverlay);
searchOverlayClose.addEventListener("click", closeSearchOverlay);
searchOverlay.addEventListener("click", e => { if (e.target === searchOverlay) closeSearchOverlay(); });
searchInput.addEventListener("input", e => renderSearchResults(e.target.value));
searchClear.addEventListener("click", () => { searchInput.value = ""; renderSearchResults(""); searchInput.focus(); });

   "genres" di tiap item DATA. Klik satu genre buat buka
   LIST PAGE berisi semua judul (donghua+anime) dengan genre itu.
   ========================================================= */
const genresPage = document.getElementById("genresPage");
const genresBack = document.getElementById("genresBack");
const genreSearchInput = document.getElementById("genreSearchInput");
const navGenres = document.getElementById("navGenres");
const navGenresDrawer = document.getElementById("navGenresDrawer");

function computeGenreCounts(){
  const counts = {};
  [...DATA.donghua, ...DATA.anime].forEach(item => {
    (item.genres || []).forEach(g => { counts[g] = (counts[g] || 0) + 1; });
  });
  return counts;
}

function renderGenresPage(filterText){
  const counts = computeGenreCounts();
  const grid = document.getElementById("genreGrid");
  const emptyEl = document.getElementById("genreEmpty");
  grid.innerHTML = "";
  const q = (filterText || "").trim().toLowerCase();
  const names = Object.keys(counts).sort((a,b) => a.localeCompare(b)).filter(g => g.toLowerCase().includes(q));

  if (names.length === 0) {
    emptyEl.style.display = "block";
    grid.style.display = "none";
    return;
  }
  emptyEl.style.display = "none";
  grid.style.display = "grid";

  names.forEach(g => {
    const card = document.createElement("div");
    card.className = "genre-card";
    const name = document.createElement("div");
    name.className = "genre-card-name";
    name.textContent = g;
    const count = document.createElement("div");
    count.className = "genre-card-count";
    count.innerHTML = '<span class="dot"></span>' + counts[g] + " judul";
    card.appendChild(name);
    card.appendChild(count);
    card.addEventListener("click", () => {
      closeGenresPage();
      const filtered = allSource().filter(({ item }) => (item.genres || []).includes(g));
      openListPage("Genre: " + g, filtered, { searchable: false });
    });
    grid.appendChild(card);
  });
}

function openGenresPage(){
  renderGenresPage(genreSearchInput.value);
  genresPage.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeGenresPage(){
  genresPage.classList.remove("open");
  document.body.style.overflow = "";
}
genresBack.addEventListener("click", closeGenresPage);
genreSearchInput.addEventListener("input", e => renderGenresPage(e.target.value));
navGenres.addEventListener("click", e => { e.preventDefault(); openGenresPage(); });
navGenresDrawer.addEventListener("click", () => { closeDrawer(); openGenresPage(); });

/* =========================================================
   DETAIL MODAL — muncul saat kartu di-klik, isinya genre,
   sinopsis, judul, dan badge jadwal (ongoing/tamat).
   Genre & sinopsis: isi field "genres" dan "synopsis" di data
   item-nya kalau belum ada (lihat contoh di beberapa judul).
   releaseDay: isi field ini (contoh: "Sabtu") biar badge-nya
   nampilin "Setiap Sabtu" pas status ongoing.
   ========================================================= */
const ICON_CALENDAR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';

const detailOverlay = document.getElementById("detailOverlay");
const detailBanner = document.getElementById("detailBanner");
const detailGlyph = document.getElementById("detailGlyph");
const detailSchedule = document.getElementById("detailSchedule");
const detailTitleEl = document.getElementById("detailTitle");
const detailGenres = document.getElementById("detailGenres");
const detailSinopsis = document.getElementById("detailSinopsis");
const detailClose = document.getElementById("detailClose");

function openDetail(item, cat){
  // --> Isi gambar banner KHUSUS di sini (beda dari poster di kartu list):
  // banner idealnya foto landscape/lebar, BUKAN poster portrait,
  // supaya gak ke-crop aneh pas distretch ke kotak lebar ini.
  const img = item.banner;
  if (img) {
    detailBanner.style.backgroundImage = `url(${img})`;
    detailBanner.classList.remove("pg-0","pg-1","pg-2","pg-3","pg-4","pg-5");
    detailGlyph.textContent = "";
  } else {
    detailBanner.style.backgroundImage = "none";
    const paletteClass = "pg-" + (hashTitle(item.title) % 6);
    detailBanner.className = "detail-banner " + paletteClass;
    detailGlyph.textContent = item.title.split(" ").map(w => w[0]).join("").slice(0,3);
  }

  const isEnd = item.eps === "END";
  detailSchedule.className = "detail-schedule " + (isEnd ? "tamat" : "ongoing");
  detailSchedule.innerHTML = isEnd
    ? ICON_CHECK + "Tamat"
    : ICON_CALENDAR + (item.releaseDay ? "Setiap " + item.releaseDay : "Update berkala");

  detailTitleEl.textContent = item.title + (item.season ? " " + item.season : "");

  detailGenres.innerHTML = "";
  const genres = (item.genres && item.genres.length) ? item.genres : ["Genre belum diisi"];
  genres.forEach(g => {
    const chip = document.createElement("span");
    chip.className = "genre-chip" + (cat === "donghua" ? " donghua" : "");
    chip.textContent = g;
    detailGenres.appendChild(chip);
  });

  detailSinopsis.textContent = item.synopsis ||
    `Sinopsis "${item.title}" belum ditambahkan. Isi field "synopsis" di data item ini buat nampilin di sini.`;

  detailOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeDetail(){
  detailOverlay.classList.remove("open");
  document.body.style.overflow = "";
}
detailClose.addEventListener("click", closeDetail);
detailOverlay.addEventListener("click", e => { if (e.target === detailOverlay) closeDetail(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

/* horizontal row scroll buttons */
/* =========================================================
   HERO BANNER — pakai HERO_PICKS (lihat bagian DATA di atas),
   jadi cuma judul rekomendasi yang muncul, bisa di-swipe
   (sentuh/drag) sama seperti carousel doujindesu.
   ========================================================= */
const heroItems = HERO_PICKS;

const slidesEl = document.getElementById("slides");
const dotsEl = document.getElementById("heroDots");
let current = 0;

heroItems.forEach((item, idx) => {
  const slide = document.createElement("div");
  slide.className = "slide pg-" + (idx % 6);

  // --> Isi gambar landscape/lebar di sini lewat field "banner":
  // if (item.banner) slide.querySelector('.bg').style.backgroundImage = `url(${item.banner})`;
  const bg = document.createElement("div");
  bg.className = "bg";
  if (item.banner) bg.style.backgroundImage = `url(${item.banner})`;
  slide.appendChild(bg);

  const scrim = document.createElement("div");
  scrim.className = "scrim";
  slide.appendChild(scrim);

  const content = document.createElement("div");
  content.className = "slide-content";

  const kicker = document.createElement("span");
  kicker.className = "kicker " + (item.cat === "anime" ? "k-anime" : "k-donghua");
  kicker.textContent = item.cat === "anime" ? "ANIME" : "DONGHUA";

  const title = document.createElement("div");
  title.className = "slide-title";
  title.textContent = item.title;

  const meta = document.createElement("div");
  meta.className = "slide-meta";
  const badge = document.createElement("span");
  badge.className = "ep-badge" + (item.eps === "END" ? " end" : "");
  badge.innerHTML = '<span class="dot"></span>' + epLabel(item);
  meta.appendChild(badge);

  content.appendChild(kicker);
  content.appendChild(title);
  content.appendChild(meta);
  slide.appendChild(content);
  slidesEl.appendChild(slide);

  const dot = document.createElement("button");
  dot.addEventListener("click", () => goTo(idx));
  dotsEl.appendChild(dot);
});

function update(){
  slidesEl.style.transform = `translateX(${-current * 100}%)`;
  [...dotsEl.children].forEach((d, i) => d.classList.toggle("active", i === current));
}
function goTo(i){
  current = (i + heroItems.length) % heroItems.length;
  update();
  restartAutoplay();
}
function next(){ goTo(current + 1); }
function prev(){ goTo(current - 1); }

document.getElementById("heroNext").addEventListener("click", next);
document.getElementById("heroPrev").addEventListener("click", prev);

let autoplay = setInterval(next, 5000);
function restartAutoplay(){
  clearInterval(autoplay);
  autoplay = setInterval(next, 5000);
}

/* swipe (touch + mouse drag) */
const heroEl = document.getElementById("hero");
let startX = 0, deltaX = 0, dragging = false;

function dragStart(x){ dragging = true; startX = x; clearInterval(autoplay); }
function dragMove(x){ if(!dragging) return; deltaX = x - startX; }
function dragEnd(){
  if(!dragging) return;
  dragging = false;
  if (deltaX < -60) next();
  else if (deltaX > 60) prev();
  else restartAutoplay();
  deltaX = 0;
}

heroEl.addEventListener("touchstart", e => dragStart(e.touches[0].clientX));
heroEl.addEventListener("touchmove", e => dragMove(e.touches[0].clientX));
heroEl.addEventListener("touchend", dragEnd);

heroEl.addEventListener("mousedown", e => dragStart(e.clientX));
heroEl.addEventListener("mousemove", e => dragMove(e.clientX));
heroEl.addEventListener("mouseup", dragEnd);
heroEl.addEventListener("mouseleave", () => { if(dragging) dragEnd(); });

update();
</script>
</body>
</html>
