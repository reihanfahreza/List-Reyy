<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TONTONANKU — Katalog Anime & Donghua</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0E14;
    --panel:#13172238;
    --panel-solid:#151A28;
    --line:#252B3D;
    --text:#EDEAE0;
    --muted:#8B91A8;
    --amber:#FF6B35;   /* aksen ANIME */
    --jade:#2DD4BF;    /* aksen DONGHUA */
    --gold:#E8B45A;

    --display:'Anton', sans-serif;
    --body:'Plus Jakarta Sans', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:var(--body);
    overflow-x:hidden;
  }
  a{color:inherit; text-decoration:none;}

  ::selection{background:var(--amber); color:#0B0E14;}

  /* ---------- NAVBAR ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px clamp(16px,5vw,48px);
    background:linear-gradient(to bottom, rgba(11,14,20,0.95), rgba(11,14,20,0));
    backdrop-filter:blur(2px);
  }
  .logo{
    font-family:var(--display);
    font-size:22px;
    letter-spacing:0.5px;
    display:flex; align-items:baseline; gap:6px;
  }
  .logo span{color:var(--amber);}
  nav{display:flex; gap:28px; font-size:14px; font-weight:600;}
  nav a{
    color:var(--muted);
    position:relative;
    padding-bottom:4px;
    transition:color .2s;
  }
  nav a:hover{color:var(--text);}
  nav a:focus-visible{outline:2px solid var(--gold); outline-offset:4px; border-radius:2px;}

  /* ---------- HERO / BANNER ---------- */
  .hero{
    position:relative;
    height:min(86vh, 640px);
    min-height:420px;
    overflow:hidden;
  }
  .slides{
    display:flex;
    height:100%;
    transition:transform .55s cubic-bezier(.65,0,.35,1);
    touch-action: pan-y;
  }
  .slide{
    position:relative;
    flex:0 0 100%;
    height:100%;
    display:flex;
    align-items:flex-end;
    padding:clamp(28px,6vw,72px);
    user-select:none;
  }
  .slide .bg{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
  }
  .slide .scrim{
    position:absolute; inset:0;
    background:
      linear-gradient(to top, var(--ink) 5%, rgba(11,14,20,.15) 55%, rgba(11,14,20,.55) 100%),
      linear-gradient(to right, rgba(11,14,20,.65) 0%, rgba(11,14,20,0) 55%);
  }
  .slide-content{position:relative; z-index:2; max-width:640px;}
  .kicker{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:2px;
    padding:5px 10px;
    border:1px solid currentColor;
    border-radius:3px;
    display:inline-block;
    margin-bottom:14px;
  }
  .kicker.k-anime{color:var(--amber);}
  .kicker.k-donghua{color:var(--jade);}
  .slide-title{
    font-family:var(--display);
    font-size:clamp(32px,6vw,58px);
    line-height:1.02;
    text-transform:uppercase;
    margin-bottom:14px;
    text-shadow:0 4px 24px rgba(0,0,0,.4);
  }
  .slide-meta{
    display:flex; align-items:center; gap:14px;
    font-family:var(--mono); font-size:13px; color:var(--muted);
  }
  .ep-badge{
    font-family:var(--mono);
    font-size:13px; font-weight:700;
    padding:5px 12px; border-radius:20px;
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,.06);
    border:1px solid var(--line);
  }
  .ep-badge .dot{width:6px; height:6px; border-radius:50%; background:var(--jade); animation:pulse 1.6s infinite;}
  .ep-badge.end .dot{background:var(--muted); animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

  .hero-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    z-index:3; width:42px; height:42px; border-radius:50%;
    background:rgba(11,14,20,.55); border:1px solid var(--line);
    color:var(--text); font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background .2s, transform .2s;
  }
  .hero-arrow:hover{background:rgba(11,14,20,.85); transform:translateY(-50%) scale(1.06);}
  .hero-arrow.prev{left:18px;}
  .hero-arrow.next{right:18px;}

  .hero-dots{
    position:absolute; bottom:18px; right:clamp(16px,5vw,48px); z-index:3;
    display:flex; gap:8px;
  }
  .hero-dots button{
    width:26px; height:4px; border-radius:2px; border:none;
    background:rgba(255,255,255,.25); cursor:pointer; transition:background .2s, width .2s;
  }
  .hero-dots button.active{background:var(--gold); width:38px;}

  /* ---------- SECTIONS ---------- */
  main{padding:48px clamp(16px,5vw,48px) 80px;}
  .section{margin-bottom:56px;}
  .section-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:18px;
  }
  .section-title{
    font-family:var(--display);
    font-size:clamp(22px,3vw,30px);
    text-transform:uppercase;
    letter-spacing:1px;
    display:flex; align-items:center; gap:12px;
  }
  .section-title .bar{width:6px; height:24px; border-radius:2px;}
  .section-title.donghua .bar{background:var(--jade);}
  .section-title.anime .bar{background:var(--amber);}
  .section-sub{font-family:var(--mono); font-size:12px; color:var(--muted);}

  .row-wrap{position:relative;}
  .row{
    display:flex; gap:18px;
    overflow-x:auto;
    scroll-snap-type:x proximity;
    padding-bottom:8px;
    scrollbar-width:none;
  }
  .row::-webkit-scrollbar{display:none;}

  .row-nav{
    position:absolute; top:38%; transform:translateY(-50%);
    width:36px; height:36px; border-radius:50%;
    background:var(--panel-solid); border:1px solid var(--line);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:2; opacity:.85; transition:opacity .2s;
  }
  .row-nav:hover{opacity:1;}
  .row-nav.left{left:-14px;}
  .row-nav.right{right:-14px;}

  .card{
    flex:0 0 180px;
    scroll-snap-align:start;
    cursor:default;
  }
  .poster{
    position:relative;
    width:180px; height:252px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    transition:transform .25s, border-color .25s;
  }
  .card:hover .poster{transform:translateY(-6px); border-color:var(--gold);}
  .poster-glyph{
    font-family:var(--display);
    font-size:42px;
    color:rgba(255,255,255,.35);
    text-transform:uppercase;
  }
  .poster-status{
    position:absolute; top:8px; left:8px;
    font-family:var(--mono); font-size:10px; font-weight:700;
    padding:3px 8px; border-radius:12px;
    background:rgba(11,14,20,.65); backdrop-filter:blur(2px);
    display:flex; align-items:center; gap:5px;
  }
  .poster-status .dot{width:5px; height:5px; border-radius:50%; background:var(--jade); animation:pulse 1.6s infinite;}
  .poster-status.end .dot{background:var(--muted); animation:none;}

  .card-title{
    margin-top:10px; font-size:14px; font-weight:700;
    line-height:1.3;
  }
  .card-eps{
    margin-top:3px; font-family:var(--mono); font-size:11px; color:var(--muted);
  }

  /* --- placeholder gradient generator: ganti dengan poster asli (lihat komentar di JS) --- */
  .pg-0{background:linear-gradient(150deg,#1f2440,#3a2a55);}
  .pg-1{background:linear-gradient(150deg,#16363a,#1f5c52);}
  .pg-2{background:linear-gradient(150deg,#3a1f1f,#6e3326);}
  .pg-3{background:linear-gradient(150deg,#2a1f3a,#5a2a55);}
  .pg-4{background:linear-gradient(150deg,#1f3a2e,#246e4f);}
  .pg-5{background:linear-gradient(150deg,#3a2a1f,#6e5226);}

  footer{
    padding:28px clamp(16px,5vw,48px) 40px;
    border-top:1px solid var(--line);
    font-family:var(--mono); font-size:12px; color:var(--muted);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }

  @media (max-width:640px){
    nav{display:none;}
    .row-nav{display:none;}
    .card{flex:0 0 130px;}
    .poster{width:130px; height:182px;}
  }

  @media (prefers-reduced-motion:reduce){
    .slides{transition:none;}
    .ep-badge .dot, .poster-status .dot{animation:none;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">TONTONAN<span>KU</span></div>
  <nav>
    <a href="#donghua">Donghua</a>
    <a href="#anime">Anime</a>
  </nav>
</header>

<!-- ====== HERO BANNER (swipeable) ====== -->
<section class="hero" id="hero">
  <div class="slides" id="slides">
    <!-- slide JS digenerate dari data di bawah -->
  </div>
  <button class="hero-arrow prev" id="heroPrev" aria-label="Sebelumnya">&#8249;</button>
  <button class="hero-arrow next" id="heroNext" aria-label="Berikutnya">&#8250;</button>
  <div class="hero-dots" id="heroDots"></div>
</section>

<main>
  <!-- ====== DONGHUA ====== -->
  <section class="section" id="donghua">
    <div class="section-head">
      <div class="section-title donghua"><span class="bar"></span>Donghua</div>
      <div class="section-sub">sudah ditonton</div>
    </div>
    <div class="row-wrap">
      <button class="row-nav left" data-target="row-donghua" aria-label="Geser kiri">&#8249;</button>
      <div class="row" id="row-donghua"></div>
      <button class="row-nav right" data-target="row-donghua" aria-label="Geser kanan">&#8250;</button>
    </div>
  </section>

  <!-- ====== ANIME ====== -->
  <section class="section" id="anime">
    <div class="section-head">
      <div class="section-title anime"><span class="bar"></span>Anime</div>
      <div class="section-sub">sudah ditonton</div>
    </div>
    <div class="row-wrap">
      <button class="row-nav left" data-target="row-anime" aria-label="Geser kiri">&#8249;</button>
      <div class="row" id="row-anime"></div>
      <button class="row-nav right" data-target="row-anime" aria-label="Geser kanan">&#8250;</button>
    </div>
  </section>
</main>

<footer>
  <span>TONTONANKU — daftar pribadi, bukan situs streaming.</span>
  <span id="totalCount"></span>
</footer>

<script>
/* =========================================================
   DATA — edit daftar di sini kalau mau nambah/ubah judul.
   eps: angka episode terakhir ditonton, atau "END" kalau tamat.
   season: opsional, contoh "S2" (tampil sebelum jumlah episode).
   poster: opsional — isi dengan URL gambar poster asli kamu.
           kalau dikosongkan, otomatis pakai placeholder gradient.
   ========================================================= */
const DATA = {
  donghua: [
    { title: "Shrouding The Heavens", eps: 150 },
    { title: "Soul Land", season: "S2", eps: 143 },
    { title: "Supreme Alchemy", eps: 165 },
  ],
  anime: [
    { title: "One Piece", eps: 1111 },
    { title: "Ao No Hako", eps: "END" },
    { title: "Solo Leveling", eps: "END" },
  ]
};

function epLabel(item){
  const seasonPart = item.season ? item.season + " · " : "";
  if (item.eps === "END") return seasonPart + "Tamat";
  return seasonPart + "Eps " + item.eps;
}

function buildPoster(item, idx, paletteOffset){
  const div = document.createElement("div");
  div.className = "poster pg-" + ((idx + paletteOffset) % 6);
  // --> Ganti placeholder dengan poster asli:
  // if (item.poster) div.style.background = `url(${item.poster}) center/cover`;
  if (item.poster) {
    div.style.background = `url(${item.poster}) center/cover`;
  } else {
    const glyph = document.createElement("div");
    glyph.className = "poster-glyph";
    glyph.textContent = item.title.split(" ").map(w => w[0]).join("").slice(0,3);
    div.appendChild(glyph);
  }
  const status = document.createElement("div");
  status.className = "poster-status" + (item.eps === "END" ? " end" : "");
  status.innerHTML = '<span class="dot"></span>' + (item.eps === "END" ? "TAMAT" : "ONGOING");
  div.appendChild(status);
  return div;
}

function renderRow(rowId, items, paletteOffset){
  const row = document.getElementById(rowId);
  items.forEach((item, idx) => {
    const card = document.createElement("div");
    card.className = "card";
    card.appendChild(buildPoster(item, idx, paletteOffset));
    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = item.title;
    const eps = document.createElement("div");
    eps.className = "card-eps";
    eps.textContent = epLabel(item);
    card.appendChild(title);
    card.appendChild(eps);
    row.appendChild(card);
  });
}

renderRow("row-donghua", DATA.donghua, 0);
renderRow("row-anime", DATA.anime, 3);

document.getElementById("totalCount").textContent =
  (DATA.donghua.length + DATA.anime.length) + " judul tersimpan";

/* horizontal row scroll buttons */
document.querySelectorAll(".row-nav").forEach(btn => {
  btn.addEventListener("click", () => {
    const row = document.getElementById(btn.dataset.target);
    const dir = btn.classList.contains("left") ? -1 : 1;
    row.scrollBy({ left: dir * 360, behavior: "smooth" });
  });
});

/* =========================================================
   HERO BANNER — semua judul digabung jadi slide yang bisa
   di-swipe (sentuh/drag) sama seperti carousel doujindesu.
   ========================================================= */
const heroItems = [
  ...DATA.donghua.map(i => ({ ...i, cat: "donghua" })),
  ...DATA.anime.map(i => ({ ...i, cat: "anime" })),
];

const slidesEl = document.getElementById("slides");
const dotsEl = document.getElementById("heroDots");
let current = 0;

heroItems.forEach((item, idx) => {
  const slide = document.createElement("div");
  slide.className = "slide pg-" + (idx % 6);

  // --> Ganti background placeholder dengan gambar key visual asli:
  // if (item.poster) slide.querySelector('.bg').style.backgroundImage = `url(${item.poster})`;
  const bg = document.createElement("div");
  bg.className = "bg";
  if (item.poster) bg.style.backgroundImage = `url(${item.poster})`;
  slide.appendChild(bg);

  const scrim = document.createElement("div");
  scrim.className = "scrim";
  slide.appendChild(scrim);

  const content = document.createElement("div");
  content.className = "slide-content";

  const kicker = document.createElement("span");
  kicker.className = "kicker " + (item.cat === "anime" ? "k-anime" : "k-donghua");
  kicker.textContent = item.cat === "anime" ? "ANIME" : "DONGHUA";

  const title = document.createElement("div");
  title.className = "slide-title";
  title.textContent = item.title;

  const meta = document.createElement("div");
  meta.className = "slide-meta";
  const badge = document.createElement("span");
  badge.className = "ep-badge" + (item.eps === "END" ? " end" : "");
  badge.innerHTML = '<span class="dot"></span>' + epLabel(item);
  meta.appendChild(badge);

  content.appendChild(kicker);
  content.appendChild(title);
  content.appendChild(meta);
  slide.appendChild(content);
  slidesEl.appendChild(slide);

  const dot = document.createElement("button");
  dot.addEventListener("click", () => goTo(idx));
  dotsEl.appendChild(dot);
});

function update(){
  slidesEl.style.transform = `translateX(${-current * 100}%)`;
  [...dotsEl.children].forEach((d, i) => d.classList.toggle("active", i === current));
}
function goTo(i){
  current = (i + heroItems.length) % heroItems.length;
  update();
  restartAutoplay();
}
function next(){ goTo(current + 1); }
function prev(){ goTo(current - 1); }

document.getElementById("heroNext").addEventListener("click", next);
document.getElementById("heroPrev").addEventListener("click", prev);

let autoplay = setInterval(next, 5000);
function restartAutoplay(){
  clearInterval(autoplay);
  autoplay = setInterval(next, 5000);
}

/* swipe (touch + mouse drag) */
const heroEl = document.getElementById("hero");
let startX = 0, deltaX = 0, dragging = false;

function dragStart(x){ dragging = true; startX = x; clearInterval(autoplay); }
function dragMove(x){ if(!dragging) return; deltaX = x - startX; }
function dragEnd(){
  if(!dragging) return;
  dragging = false;
  if (deltaX < -60) next();
  else if (deltaX > 60) prev();
  else restartAutoplay();
  deltaX = 0;
}

heroEl.addEventListener("touchstart", e => dragStart(e.touches[0].clientX));
heroEl.addEventListener("touchmove", e => dragMove(e.touches[0].clientX));
heroEl.addEventListener("touchend", dragEnd);

heroEl.addEventListener("mousedown", e => dragStart(e.clientX));
heroEl.addEventListener("mousemove", e => dragMove(e.clientX));
heroEl.addEventListener("mouseup", dragEnd);
heroEl.addEventListener("mouseleave", () => { if(dragging) dragEnd(); });

update();
</script>
</body>
</html>
